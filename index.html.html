<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>SmartCart+ — AI Grocery Assistant</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F5F3EE;--surf:#FFFFFF;--s2:#EDEBE4;--s3:#E2DFD7;
  --bdr:#D6D2CA;--bdr2:#B5B0A5;
  --tx:#16140D;--tx2:#524E47;--tx3:#908C85;
  --g:#2A5F3F;--g2:#3D9E64;--gbg:#D2EFE0;--gb:#96D8B2;
  --a:#AD5907;--abg:#FDF0DF;--ab:#F4C472;
  --r:#B02B2B;--rbg:#FCEAEA;--rb:#EEAAAA;
  --b:#1A4D78;--bbg:#E3F0FA;--bb:#90C3E8;
  --p:#5A2A88;--pbg:#EEE6FA;--pb:#BF99E0;
  --rr:9px;--rlg:15px;
  --sh:0 1px 7px rgba(0,0,0,.07);--shm:0 4px 20px rgba(0,0,0,.12);
  --fd:'Syne',sans-serif;--fb:'DM Sans',sans-serif;
  --tr:all .16s cubic-bezier(.4,0,.2,1);
}
html,body{height:100%;font-family:var(--fb);background:var(--bg);color:var(--tx);font-size:14px}
#app{display:flex;flex-direction:column;min-height:100vh}
.hdr{background:var(--surf);border-bottom:1px solid var(--bdr);padding:0 20px;height:56px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:200;box-shadow:var(--sh)}
.logo{width:34px;height:34px;background:var(--g);border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo svg{width:18px;height:18px}
.appname{font-family:var(--fd);font-size:16px;font-weight:700;letter-spacing:-.3px}
.plus{color:var(--g2)}
.hright{margin-left:auto;display:flex;gap:8px;align-items:center}
.hbadge{display:flex;align-items:center;gap:4px;border-radius:20px;padding:3px 11px;font-size:11px;font-weight:500;border:1px solid}
.hbg{background:var(--gbg);border-color:var(--gb);color:var(--g)}
.hba{background:var(--abg);border-color:var(--ab);color:var(--a)}
.nav{background:var(--surf);border-bottom:1px solid var(--bdr);display:flex;padding:0 20px;overflow-x:auto;scrollbar-width:none}
.nav::-webkit-scrollbar{display:none}
.nb{display:flex;align-items:center;gap:6px;padding:14px 15px;font-family:var(--fb);font-size:13px;font-weight:500;color:var(--tx2);background:none;border:none;border-bottom:2.5px solid transparent;white-space:nowrap;cursor:pointer;transition:var(--tr)}
.nb:hover{color:var(--tx)}
.nb.on{color:var(--g);border-bottom-color:var(--g)}
.main{flex:1;padding:24px 20px;max-width:1060px;margin:0 auto;width:100%}
.card{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--rlg);box-shadow:var(--sh);overflow:hidden;margin-bottom:18px}
.ch{padding:17px 22px 14px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:11px}
.chi{width:34px;height:34px;border-radius:var(--rr);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.ct{font-family:var(--fd);font-size:14.5px;font-weight:700}
.cs{font-size:11.5px;color:var(--tx3);margin-top:2px}
.cb{padding:18px 22px}
.cact{margin-left:auto;display:flex;gap:8px;align-items:center}
.btn{display:inline-flex;align-items:center;gap:7px;padding:9px 18px;border-radius:var(--rr);font-size:13px;font-weight:500;border:none;cursor:pointer;transition:var(--tr);font-family:var(--fb)}
.btn:disabled{opacity:.45;cursor:not-allowed}
.bp{background:var(--g);color:#fff}.bp:hover:not(:disabled){background:#1f4530}
.bg2{background:none;color:var(--tx2);border:1px solid var(--bdr)}.bg2:hover:not(:disabled){background:var(--s2)}
.bd{background:var(--rbg);color:var(--r);border:1px solid var(--rb)}.bd:hover:not(:disabled){background:var(--rb)}
.bsm{padding:5px 12px;font-size:12px}
.bfull{width:100%;justify-content:center}
.inp{width:100%;padding:9px 13px;border-radius:var(--rr);border:1px solid var(--bdr);background:var(--s2);font-size:13px;color:var(--tx);outline:none;transition:var(--tr);font-family:var(--fb)}
.inp:focus{border-color:var(--g2);background:var(--surf);box-shadow:0 0 0 3px rgba(61,158,100,.12)}
textarea.inp{resize:vertical;min-height:78px}
.sel{padding:8px 12px;border-radius:var(--rr);border:1px solid var(--bdr);background:var(--s2);font-size:13px;color:var(--tx);outline:none;cursor:pointer;font-family:var(--fb);width:100%}
.sel:focus{border-color:var(--g2)}
.fl{font-size:12px;color:var(--tx3);display:block;margin-bottom:5px}
.irow{display:flex;gap:9px;margin-bottom:12px}
.two{display:grid;grid-template-columns:1fr 1fr;gap:18px}
@media(max-width:640px){.two{grid-template-columns:1fr}.rgrid{grid-template-columns:1fr!important}.wgrid{grid-template-columns:repeat(4,1fr)!important}}
.srow{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px}
.sc{background:var(--s2);border-radius:var(--rr);padding:12px 16px;flex:1;min-width:90px}
.sn{font-family:var(--fd);font-size:24px;font-weight:700;color:var(--g)}
.sl{font-size:11px;color:var(--tx3);margin-top:1px}
.chip{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:11.5px;font-weight:500;border:1px solid;cursor:default}
.cg{background:var(--gbg);color:var(--g);border-color:var(--gb)}
.ca{background:var(--abg);color:var(--a);border-color:var(--ab)}
.cr{background:var(--rbg);color:var(--r);border-color:var(--rb)}
.cb2{background:var(--bbg);color:var(--b);border-color:var(--bb)}
.cp{background:var(--pbg);color:var(--p);border-color:var(--pb)}
.cgr{background:var(--s2);color:var(--tx2);border-color:var(--bdr)}
.ck{cursor:pointer!important}.ck:hover{filter:brightness(.92)}
.dvd{height:1px;background:var(--bdr);margin:14px 0}
.slbl{font-family:var(--fd);font-size:10.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--tx3);margin-bottom:9px;display:flex;align-items:center;gap:6px}
.slbl::after{content:'';flex:1;height:1px;background:var(--bdr)}
.plist{list-style:none}
.pitem{display:flex;align-items:center;gap:9px;padding:8px 0;border-bottom:1px solid var(--bdr)}
.pitem:last-child{border-bottom:none}
.pn{flex:1;font-size:13px}
.pc{font-size:11.5px;color:var(--tx3)}
.rmb{width:21px;height:21px;border-radius:50%;background:none;border:1px solid var(--bdr);color:var(--tx3);font-size:14px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:var(--tr);flex-shrink:0}
.rmb:hover{background:var(--rbg);border-color:var(--rb);color:var(--r)}
.sitem{display:flex;align-items:flex-start;gap:11px;padding:9px 13px;border-radius:var(--rr);border:1px solid var(--bdr);background:var(--surf);margin-bottom:6px;cursor:pointer;transition:var(--tr)}
.sitem:hover{background:var(--s2)}
.sitem.done{opacity:.5}
.sitem.done .snm{text-decoration:line-through}
.schk{width:19px;height:19px;border-radius:50%;border:1.5px solid var(--bdr2);background:var(--s2);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:10px;transition:var(--tr);margin-top:2px}
.sitem.done .schk{background:var(--g);border-color:var(--g);color:#fff}
.snm{font-size:13px;font-weight:500}
.pbar{height:4px;background:var(--s2);border-radius:2px;overflow:hidden;margin:8px 0}
.pfill{height:100%;background:var(--g2);border-radius:2px;transition:width .3s}
.shopcat{margin-bottom:18px}
.rgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:14px}
.rcard{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--rlg);overflow:hidden;transition:var(--tr)}
.rcard:hover{transform:translateY(-2px);box-shadow:var(--shm);border-color:var(--gb)}
.rthumb{width:100%;height:150px;object-fit:cover;display:block}
.rhdr{padding:14px 15px 10px;display:flex;align-items:flex-start;gap:10px}
.remi{font-size:28px;line-height:1}
.rname{font-family:var(--fd);font-size:13.5px;font-weight:700;margin-bottom:3px}
.rmeta{font-size:11px;color:var(--tx3);display:flex;gap:8px;flex-wrap:wrap}
.rdesc{padding:0 15px 10px;font-size:12.5px;color:var(--tx2);line-height:1.5}
.rtags{padding:0 15px 12px;display:flex;gap:4px;flex-wrap:wrap}
.rdvd{height:1px;background:var(--bdr);margin:0 15px}
.rings{padding:12px 15px}
.rrow{display:flex;align-items:center;gap:7px;margin-bottom:5px;font-size:12px}
.hd{width:6px;height:6px;border-radius:50%;background:var(--g2);flex-shrink:0}
.nd{width:6px;height:6px;border-radius:50%;background:var(--a);flex-shrink:0}
.rfoot{padding:11px 15px;background:var(--s2);display:flex;gap:7px;align-items:center}
.rsteps{padding:12px 15px}
.strow{display:flex;gap:9px;margin-bottom:9px}
.stnum{width:21px;height:21px;border-radius:50%;background:var(--g);color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sttxt{font-size:12.5px;color:var(--tx2);line-height:1.55;flex:1}
.rtip{background:var(--abg);border:1px solid var(--ab);border-radius:var(--rr);padding:9px 13px;font-size:12px;color:var(--a);margin-top:9px}
.fbtn{background:none;border:none;font-size:17px;cursor:pointer;color:var(--tx3);transition:var(--tr);flex-shrink:0}
.fbtn.on{color:#F0A500}
.fitem{display:flex;align-items:center;gap:12px;background:var(--surf);border:1px solid var(--bdr);border-radius:var(--rr);padding:12px 15px;transition:var(--tr);margin-bottom:9px}
.fitem:hover{border-color:var(--gb);box-shadow:var(--sh)}
.fn{font-size:13px;font-weight:500;flex:1}
.tabs{display:flex;gap:3px;background:var(--s2);border-radius:var(--rr);padding:3px;margin-bottom:18px}
.tb{flex:1;padding:7px;border:none;background:none;border-radius:6px;font-size:12.5px;font-weight:500;color:var(--tx2);cursor:pointer;font-family:var(--fb);transition:var(--tr)}
.tb.on{background:var(--surf);color:var(--g);box-shadow:var(--sh)}
.wgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:7px}
.dlbl{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--tx3);margin-bottom:7px;text-align:center}
.mslot{background:var(--s2);border:1px solid var(--bdr);border-radius:var(--rr);padding:7px;margin-bottom:6px;min-height:62px;transition:var(--tr)}
.mslot:hover{border-color:var(--g2);background:var(--gbg)}
.mslab{font-size:8.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--tx3);margin-bottom:2px}
.msname{font-size:10.5px;font-weight:500;line-height:1.35}
.lstate{text-align:center;padding:36px 18px;color:var(--tx2)}
.lico{font-size:30px;margin-bottom:10px;animation:pulse 1.3s ease-in-out infinite}
.ltit{font-family:var(--fd);font-size:14px;font-weight:600;margin-bottom:6px}
.lsub{font-size:13px;color:var(--tx3)}
.lbar{height:3px;background:var(--gbg);border-radius:2px;overflow:hidden;margin:12px auto 0;max-width:160px}
.lfill{height:100%;background:var(--g2);width:36%;animation:ls 1.2s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
@keyframes ls{0%{transform:translateX(-220%)}100%{transform:translateX(560%)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fin{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.spn{display:inline-block;width:13px;height:13px;border-radius:50%;border:2px solid rgba(255,255,255,.35);border-top-color:#fff;animation:spin .6s linear infinite}
.empty{text-align:center;padding:42px 18px;color:var(--tx3)}
.eico{font-size:38px;margin-bottom:12px}
.etit{font-family:var(--fd);font-size:14.5px;font-weight:600;color:var(--tx2);margin-bottom:5px}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--tx);color:#fff;padding:9px 18px;border-radius:20px;font-size:12.5px;font-weight:500;box-shadow:var(--shm);z-index:999;animation:fin .2s ease;pointer-events:none;white-space:nowrap}
.srcw{background:var(--bbg);color:var(--b);border:1px solid var(--bb);border-radius:20px;padding:1px 6px;font-size:9.5px;font-weight:500}
.srcl{background:var(--s2);color:var(--tx2);border:1px solid var(--bdr);border-radius:20px;padding:1px 6px;font-size:9.5px;font-weight:500}
.err{color:var(--r);font-size:12.5px;padding:10px 13px;background:var(--rbg);border:1px solid var(--rb);border-radius:var(--rr);margin-top:10px;line-height:1.5}
</style>
</head>
<body>
<div id="app">
  <header class="hdr">
    <div class="logo">
      <svg viewBox="0 0 18 18" fill="none">
        <path d="M3 9h12M9 3v12" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
        <circle cx="6" cy="14" r="1.5" fill="#fff"/>
        <circle cx="12" cy="14" r="1.5" fill="#fff"/>
      </svg>
    </div>
    <div>
      <div class="appname">SmartCart<span class="plus">+</span></div>
      <div style="font-size:10.5px;color:var(--tx3)">AI Grocery Assistant</div>
    </div>
    <div class="hright">
      <div class="hbadge hbg" id="hpbadge">&#x1F96C; <span id="hpc">0</span> items</div>
      <div class="hbadge hba" id="hfav" style="display:none">&#x2B50; <span id="hfc">0</span></div>
    </div>
  </header>
  <nav class="nav" id="mainnav">
    <button class="nb on" data-tab="pantry">&#x1F9FA; My Pantry</button>
    <button class="nb" data-tab="shop">&#x1F6D2; Shopping</button>
    <button class="nb" data-tab="recipes">&#x1F468;&#x200D;&#x1F373; Recipes</button>
    <button class="nb" data-tab="plan">&#x1F4C5; Meal Plan</button>
  </nav>
  <main class="main" id="main"></main>
</div>
<div id="toasts"></div>
<script>
"use strict";

// ── CONSTANTS ─────────────────────────────────────────────────────────────────
const CATS = ["Produce","Dairy & Eggs","Meat & Seafood","Pantry & Dry Goods",
  "Canned & Jarred","Frozen","Bakery","Beverages","Snacks","Condiments & Spices","Other"];
const DAYS = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
const MOD  = ["Breakfast","Lunch","Dinner"];
const MDB  = "https://www.themealdb.com/api/json/v1/1";

const SAMPLE = [
  {n:"Eggs",        q:"12",      c:"Dairy & Eggs",       f:"good"},
  {n:"Cheddar Cheese",q:"1 block",c:"Dairy & Eggs",      f:"good"},
  {n:"Chicken Breast",q:"2 lbs", c:"Meat & Seafood",     f:"soon"},
  {n:"Penne Pasta", q:"1 box",   c:"Pantry & Dry Goods", f:"good"},
  {n:"Olive Oil",   q:"1 bottle",c:"Condiments & Spices",f:"good"},
  {n:"Tomatoes",    q:"4",       c:"Produce",             f:"soon"},
  {n:"Garlic",      q:"2 bulbs", c:"Produce",             f:"good"},
  {n:"Onion",       q:"3",       c:"Produce",             f:"good"},
  {n:"Spinach",     q:"1 bag",   c:"Produce",             f:"soon"},
  {n:"Greek Yogurt",q:"32 oz",   c:"Dairy & Eggs",        f:"soon"},
  {n:"Brown Rice",  q:"2 lbs",   c:"Pantry & Dry Goods",  f:"good"},
  {n:"Canned Tomatoes",q:"2 cans",c:"Canned & Jarred",    f:"good"},
];

// ── STATE ─────────────────────────────────────────────────────────────────────
const S = {
  tab: "pantry",
  pantry: JSON.parse(JSON.stringify(SAMPLE)),
  favorites: [],
  savedLists: [],
  shopList: null, shopChecked: {}, shopReq: "", shopStore: "General", shopSubTab: "gen",
  recipes: [], recipeQ: "", recipeExpanded: null, recipeSubTab: "find",
  mealPlan: null, mealPrefs: {diet:"balanced", people:"4", budget:"moderate", avoid:""},
};

// ── UTILS ─────────────────────────────────────────────────────────────────────
function toast(msg) {
  const d = document.createElement("div");
  d.className = "toast"; d.textContent = msg;
  document.getElementById("toasts").appendChild(d);
  setTimeout(() => d.remove(), 2700);
}

function badges() {
  document.getElementById("hpc").textContent = S.pantry.length;
  document.getElementById("hfc").textContent = S.favorites.length;
  document.getElementById("hfav").style.display = S.favorites.length ? "flex" : "none";
}

function loading(msg) {
  return '<div class="lstate"><div class="lico">&#x1F916;</div><div class="ltit">Working on it&hellip;</div>' +
    '<div class="lsub">' + msg + '</div><div class="lbar"><div class="lfill"></div></div></div>';
}

function pMatch(ingName, pantry) {
  const n = ingName.toLowerCase(), nw = n.split(" ")[0];
  return pantry.some(p => {
    const pn = p.n.toLowerCase(), pw = pn.split(" ")[0];
    return pn.includes(nw) || n.includes(pw) || nw.includes(pw) || pw.includes(nw);
  });
}

// ── ROUTING ───────────────────────────────────────────────────────────────────
function render() {
  badges();
  const m = document.getElementById("main");
  m.innerHTML = "";
  ({ pantry:renderPantry, shop:renderShop, recipes:renderRecipes, plan:renderPlan }[S.tab])(m);
}

document.getElementById("mainnav").addEventListener("click", e => {
  const b = e.target.closest(".nb");
  if (!b) return;
  S.tab = b.dataset.tab;
  document.querySelectorAll(".nb").forEach(x => x.classList.toggle("on", x === b));
  render();
});

// ══════════════════════════════════════════════════════════════════════════════
// TAB 1 — MY PANTRY
// ══════════════════════════════════════════════════════════════════════════════
function renderPantry(main) {
  let filterCat = "All";

  function draw() {
    const soon   = S.pantry.filter(p => p.f === "soon").length;
    const cats   = ["All", ...CATS.filter(c => S.pantry.some(p => p.c === c))];
    const list   = filterCat === "All" ? S.pantry : S.pantry.filter(p => p.c === filterCat);

    main.innerHTML =
      '<div class="srow">' +
        '<div class="sc"><div class="sn">' + S.pantry.length + '</div><div class="sl">Total items</div></div>' +
        '<div class="sc"><div class="sn" style="color:var(--a)">' + soon + '</div><div class="sl">Expiring soon</div></div>' +
        '<div class="sc"><div class="sn">' + new Set(S.pantry.map(p=>p.c)).size + '</div><div class="sl">Categories</div></div>' +
      '</div>' +
      '<div class="two">' +
        // Left — Add form
        '<div><div class="card">' +
          '<div class="ch"><div class="chi" style="background:var(--bbg)">&#x270F;&#xFE0F;</div>' +
            '<div><div class="ct">Add Item</div><div class="cs">Add any grocery item to your pantry</div></div></div>' +
          '<div class="cb">' +
            '<div class="irow"><input class="inp" id="aname" placeholder="Item name (e.g. Oat Milk)" style="flex:1"/>' +
            '<input class="inp" id="aqty" placeholder="Qty" style="max-width:80px"/></div>' +
            '<select class="sel" id="acat" style="margin-bottom:12px">' + CATS.map(c=>'<option>'+c+'</option>').join("") + '</select>' +
            '<select class="sel" id="afresh" style="margin-bottom:14px">' +
              '<option value="good">&#x1F7E2; Fresh / Good</option>' +
              '<option value="soon">&#x1F7E1; Use Soon</option>' +
              '<option value="expired">&#x1F534; Expired</option>' +
            '</select>' +
            '<button class="btn bp bfull" id="addbtn">&#x2795; Add to Pantry</button>' +
            '<div class="dvd"></div>' +
            '<button class="btn bg2 bfull" id="loadsample">&#x1F4CB; Load Sample Pantry</button>' +
            '<button class="btn bg2 bfull" style="margin-top:8px;color:var(--r)" id="clearall">&#x1F5D1;&#xFE0F; Clear All</button>' +
          '</div>' +
        '</div></div>' +
        // Right — List
        '<div><div class="card">' +
          '<div class="ch"><div class="chi" style="background:var(--gbg)">&#x1F9FA;</div>' +
            '<div><div class="ct">My Pantry (' + S.pantry.length + ')</div>' +
            '<div class="cs">Everything you currently have</div></div></div>' +
          '<div class="cb">' +
            '<div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:13px">' +
              cats.map(c => '<span class="chip ' + (filterCat===c?"cg":"cgr") + ' ck" data-fc="' + encodeURIComponent(c) + '">' + c + '</span>').join("") +
            '</div>' +
            (list.length === 0
              ? '<div class="empty" style="padding:20px 0"><div style="font-size:13px;color:var(--tx3)">No items. Add some above or load a sample!</div></div>'
              : '<ul class="plist">' + list.map(it => {
                  const dot = it.f==="expired"?"&#x1F534;":it.f==="soon"?"&#x1F7E1;":"&#x1F7E2;";
                  return '<li class="pitem">' +
                    '<span style="font-size:13px">' + dot + '</span>' +
                    '<span class="pn">' + it.n + '</span>' +
                    '<span class="pc">' + it.q + ' &middot; ' + it.c + '</span>' +
                    '<button class="rmb" data-ri="' + S.pantry.indexOf(it) + '">&times;</button>' +

            ) +

      toast('\u2713 "' + n + '" added to pantry');
      badges(); draw();
    };
    main.querySelector("#aname").onkeydown = e => { if (e.key === "Enter") main.querySelector("#addbtn").click(); };
    main.querySelector("#loadsample").onclick = () => { S.pantry = JSON.parse(JSON.stringify(SAMPLE)); toast("Sample pantry loaded!"); badges(); draw(); };

    main.querySelectorAll("[data-ri]").forEach(btn => btn.onclick = () => { S.pantry.splice(parseInt(btn.dataset.ri), 1); badges(); draw(); });
  }
  draw();
}

function generateShopList(goal, store) {
  const q = (goal || "general").toLowerCase();
  const types = [];
  if (/pasta|italian|spaghetti|bolognese/.test(q)) types.push("pasta");
  if (/chicken/.test(q)) types.push("chicken");
  if (/\bvegan\b/.test(q)) types.push("vegan");
  else if (/vegetarian|no meat|meatless|plant.based/.test(q)) types.push("vegetarian");
  if (/breakfast|morning|brunch/.test(q)) types.push("breakfast");
  if (/salad|light|fresh/.test(q)) types.push("salad");
  if (/soup|stew|chowder/.test(q)) types.push("soup");
  if (/mexican|taco|burrito|tex.mex/.test(q)) types.push("mexican");
  if (/asian|chinese|japanese|thai|stir.?fry|wok/.test(q)) types.push("asian");
  if (/healthy|nutritious|clean|balanced|diet/.test(q)) types.push("healthy");
  if (types.length === 0) types.push("general");

  const aisles = STORE_AISLES[store] || STORE_AISLES["General"];
  const seen = new Set(), list = [];
  types.forEach(type => {
    (SHOP_RULES[type] || []).forEach(item => {
      if (seen.has(item.n) || pMatch(item.n, S.pantry)) return;
      seen.add(item.n);
      const ak = CAT_TO_AISLE_KEY[item.c] || "G";
      list.push({ name:item.n, qty:item.q, category:item.c, reason:item.r,
        substitution:item.sub||null, aisle:aisles[ak]||null,
        recipe_needed_for:item.rf||null, priority:item.p||"nice-to-have" });
    });
  });
  list.sort((a,b) => (a.priority==="essential"&&b.priority!=="essential" ? -1 : b.priority==="essential"&&a.priority!=="essential" ? 1 : 0));
  const goalDesc = goal || "stocking up for the week";
  return { list, summary: "Generated " + list.length + " items for: " + goalDesc + ". Skipped " + S.pantry.length + " items already in your pantry." };
}

function buildShopHTML() {
  if (!S.shopList) return "";
  const total = S.shopList.list.length;
  const chkd  = Object.values(S.shopChecked).filter(Boolean).length;
  const pct   = total > 0 ? Math.round(chkd/total*100) : 0;

  let grouped = {};
  CATS.forEach(cat => {
    const its = S.shopList.list.filter(i => i.category === cat);
    if (its.length) grouped[cat] = its;
  });
  const unc = S.shopList.list.filter(i => !CATS.includes(i.category));
  if (unc.length) grouped["Other"] = [...(grouped["Other"]||[]), ...unc];

  let rows = "";
  Object.entries(grouped).forEach(([cat, items]) => {
    rows += '<div class="shopcat"><div class="slbl">' + cat + ' (' + items.length + ')</div>';
    items.forEach(it => {
      const done = S.shopChecked[it.name];
      rows +=
        '<div class="sitem ' + (done?"done":"") + '" data-si="' + encodeURIComponent(it.name) + '">' +
          '<div class="schk">' + (done?"&#x2713;":"") + '</div>' +
          '<div style="flex:1">' +
            '<div style="display:flex;align-items:center;gap:7px;flex-wrap:wrap">' +
              '<span class="snm">' + it.name + '</span>' +
              '<span style="font-size:11px;color:var(--tx3)">' + it.qty + '</span>' +
              (it.priority==="essential" ? '<span class="chip cr" style="font-size:10px;padding:1px 6px">Essential</span>' : "") +
              (it.recipe_needed_for ? '<span class="chip cb2" style="font-size:10px;padding:1px 6px">' + it.recipe_needed_for + '</span>' : "") +
              (it.aisle ? '<span style="background:var(--pbg);color:var(--p);border:1px solid var(--pb);border-radius:20px;padding:1px 7px;font-size:10px">' + it.aisle + '</span>' : "") +
            '</div>' +
            '<div style="font-size:11.5px;color:var(--tx3);margin-top:2px">' + (it.reason||"") + '</div>' +
            (it.substitution ? '<div style="font-size:11.5px;color:var(--g);margin-top:2px">&#x1F4A1; Sub: ' + it.substitution + '</div>' : "") +
          '</div>' +
        '</div>';
    });

  });

  return '<div class="card">' +
    '<div class="ch"><div style="flex:1">' +
      '<div class="ct">Shopping List &middot; ' + total + ' items</div>' +
      '<div class="cs">' + (S.shopList.summary||"") + '</div>' +
    '</div>' +
    '<div style="display:flex;gap:8px;align-items:center">' +
      '<span style="font-size:12px;color:var(--tx3)">' + chkd + '/' + total + '</span>' +
      '<button class="btn bg2 bsm" id="savelist">&#x1F4BE; Save</button>' +
    '</div></div>' +
    '<div class="cb">' +
      '<div class="pbar"><div class="pfill" id="shopbar" style="width:' + pct + '%"></div></div>' +
      rows +
    '</div></div>';
}

const QPROMPTS = [
  "Gluten free chocolate cake","Caramel dessert","Healthy vegetarian dinner",
  "Quick chicken pasta","High-protein breakfast no eggs","Vegan meal prep",
  "Keto low carb dinner","Easy fish dinner","Comfort food cold night","Indian curry vegetarian",

async function mdbFetch(url) {
  try {
    const ctrl = new AbortController();
    const tid  = setTimeout(() => ctrl.abort(), 8000);
    const r    = await fetch(url, { signal: ctrl.signal });
    clearTimeout(tid);
    const d = await r.json();
    return d.meals || [];
  } catch { return []; }
}

function mdbConvert(meal) {
  const ings = [];
  for (let i = 1; i <= 20; i++) {
    const nm = (meal["strIngredient"+i]||"").trim();
    const q  = (meal["strMeasure"+i]  ||"").trim();
    if (nm) ings.push({ name:nm, qty:q, have:false });
  }
  const cat    = (meal.strCategory||"").toLowerCase();
  const ingStr = ings.map(i=>i.name.toLowerCase()).join(" ");
  const nl     = (meal.strMeal||"").toLowerCase();
  const tags   = new Set();
  if (["dessert"].includes(cat))   { tags.add("dessert"); tags.add("sweet"); }
  if (cat==="breakfast")           tags.add("breakfast");
  if (cat==="vegetarian")          tags.add("vegetarian");
  if (cat==="chicken")           { tags.add("chicken"); tags.add("high-protein"); }
  if (cat==="beef")              { tags.add("beef"); tags.add("high-protein"); }
  if (cat==="seafood")           { tags.add("fish"); tags.add("high-protein"); }
  if (cat==="pasta")             { tags.add("pasta"); tags.add("italian"); }
  if (cat==="lamb")                tags.add("lamb");
  const areaL  = (meal.strArea||"").toLowerCase();
  const areaMap = {italian:"italian",french:"french",mexican:"mexican",indian:"indian",japanese:"asian",chinese:"asian",thai:"asian",greek:"mediterranean",spanish:"spanish",british:"british",american:"american",moroccan:"middle-eastern",turkish:"middle-eastern"};
  if (areaMap[areaL]) tags.add(areaMap[areaL]);
  if (!/\bflour\b|\bwheat\b|\bpasta\b|\bbread\b|\bsemolina\b|\bcouscous\b/.test(ingStr)) tags.add("gluten-free");
  if (!/\bmilk\b|\bcream\b|\bbutter\b|\bcheese\b|\byoghu?rt\b/.test(ingStr)) tags.add("dairy-free");
  if (/caramel|toffee|butterscotch/.test(nl+ingStr)) tags.add("caramel");
  if (/chocolate|cocoa/.test(nl+ingStr))             tags.add("chocolate");
  if (/\bcake\b/.test(nl))                           tags.add("cake");
  if (/cookie|biscuit/.test(nl))                     tags.add("cookies");
  if (/\bsoup\b/.test(nl))                           tags.add("soup");
  if (/\bsalad\b/.test(nl))                          tags.add("salad");
  if (/curry/.test(nl))                              tags.add("curry");
  if (ings.length <= 8) { tags.add("quick"); tags.add("easy"); }
  const catEmoji = {Dessert:"🍰",Breakfast:"🍳",Chicken:"🍗",Beef:"🥩",Pork:"🥓",Seafood:"🐟",Pasta:"🍝",Vegetarian:"🥗",Vegan:"🌱",Lamb:"🍖",Miscellaneous:"🍽️",Side:"🥙",Starter:"🥗"};
  const steps = (meal.strInstructions||"")
    .split(/\r?\n\r?\n|\n(?=[A-Z0-9])/)
    .map(s => s.replace(/^STEP\s*\d+[.:)]\s*/i,"").trim())
    .filter(s => s.length > 15).slice(0,10);
  return {
    id:"mdb_"+meal.idMeal, name:meal.strMeal,
    emoji: catEmoji[meal.strCategory]||"🍽️",
    time: ings.length<=8 ? "~25 min" : "~45 min",
    servings:"4 servings",
    difficulty: ings.length<=6?"Easy":ings.length<=12?"Medium":"Hard",
    calories:"See recipe",
    tags:[...tags],
    description:[(meal.strArea||""),(meal.strCategory||"")].filter(Boolean).join(" \u00b7 "),
    ingredients:ings,
    steps: steps.length>=2 ? steps : [(meal.strInstructions||"").slice(0,600)],
    tip: meal.strSource||null,
    sourceUrl: meal.strSource||null,
    thumbUrl: meal.strMealThumb||null,
    source:"TheMealDB",
  };
}

function scoreRecipe(r, query) {
  const q = query.toLowerCase(), nl = (r.name||"").toLowerCase(), tags = r.tags||[];
  const ingStr = (r.ingredients||[]).map(i=>(i.name||"").toLowerCase()).join(" ");
  const all = nl+" "+tags.join(" ")+" "+ingStr;
  let score = 0; const matched = {};
  const signals = [
    [/\bgluten.?free\b/,          "gluten-free", 20],
    [/\bdairy.?free\b/,           "dairy-free",  18],
    [/\bvegan\b/,                 "vegan",        22],
    [/\bvegetarian\b|\bno meat\b/,"vegetarian",  18],
    [/\bketo\b|\blow.?carb\b/,    "keto",         18],
    [/\bhigh.?protein\b|\bprotein/,"high-protein",15],
    [/\bchocolate\b|\bcocoa\b/,   "chocolate",   25],
    [/\bcaramel\b|\btoffee\b/,    "caramel",      25],
    [/\bdessert\b|\bsweet\b|\btreat\b|\bbaking\b/, "dessert", 22],
    [/\bcake\b/,                  "cake",         30],
    [/\bbrownie\b/,               "brownie",      30],
    [/\bpasta\b|\bspaghetti\b/,   "pasta",        25],
    [/\bpizza\b/,                 "pizza",        25],
    [/\bcurry\b/,                 "curry",        25],
    [/\bsoup\b/,                  "soup",         20],
    [/\bsalad\b/,                 "salad",        20],
    [/\bchicken\b/,               "chicken",      20],
    [/\bbeef\b|\bsteak\b/,        "beef",         20],
    [/\bfish\b|\bsalmon\b/,       "fish",         20],
    [/\bbreakfast\b/,             "breakfast",    22],
    [/\bquick\b|\bfast\b|\beasy\b/,"quick",         8],
    [/\bhealthy\b|\blight\b/,     "healthy",       8],
    [/\bfamily\b|\bkids\b/,       "family-friendly",8],
    [/\bitalian\b/,               "italian",      15],
    [/\bmexican\b|\btaco\b/,      "mexican",      15],
    [/\basian\b|\bstir.?fry\b/,   "stir-fry",     15],
    [/\bindian\b/,                "indian",       15],
    [/\bfrench\b/,                "french",       15],
  ];
  signals.forEach(([pat, tag, w]) => {
    if (pat.test(q)) {
      const hit = tags.includes(tag) || all.includes(tag.replace(/-/g," ")) || nl.includes(tag.replace(/-/g," "));
      if (hit) { score += nl.includes(tag.replace(/-/g," ")) ? w*2 : w; matched[tag]=true; }
      else matched[tag]=false;
    }
  });
  // Pantry match bonus
  score += (r.ingredients||[]).filter(i => pMatch(i.name, S.pantry)).length * 2;
  if (r.source==="TheMealDB") score += 3;
  return { score, matched };
}

async function findRecipes(query) {
  const results = new Map(), q = query.toLowerCase();
  const foodWords = ["cake","brownie","cookies","cheesecake","tart","mousse","pudding","pie","tiramisu","crepe","pancakes","waffle","pizza","pasta","risotto","burger","tacos","curry","soup","salad","stew","chicken","beef","salmon","shrimp","lamb","pork","breakfast","stir fry","ramen","sushi","omelette","muffin","churros","chocolate","caramel","lemon","vanilla","strawberry","blueberry","apple","banana","coconut","mango","coffee","garlic","tomato","mushroom","spinach","avocado","feta","quinoa","lentil"];
  const terms = [];
  foodWords.forEach(w => { if (q.includes(w)) terms.push(w); });
  if (!terms.length) {
    // Extract meaningful words from the query
    const words = q.split(/\s+/).filter(w => w.length > 3 && !["with","that","want","some","good","make","like","nice","quick","easy","fast","healthy","dinner","lunch","breakfast","recipe","recipes","dish","meal","food"].includes(w));
    if (words.length) terms.push(words[0]);
    else terms.push(q.slice(0,20));
  }
  // Live TheMealDB searches
  for (const term of terms.slice(0,3)) {
    (await mdbFetch(MDB + "/search.php?s=" + encodeURIComponent(term))).forEach(m => results.set(m.idMeal, m));
  }
  // For sweet/dessert queries — pull the full Dessert category
  if (/dessert|sweet|treat|cake|caramel|toffee|chocolate|brownie|cookie|pudding|pie|fudge|cheesecake|mousse|tiramisu|tart|baking/.test(q)) {
    const stubs = await mdbFetch(MDB + "/filter.php?c=Dessert");
    await Promise.all(stubs.slice(0,18).map(async stub => {
      if (!results.has(stub.idMeal)) {
        const full = await mdbFetch(MDB + "/lookup.php?i=" + stub.idMeal);
        if (full[0]) results.set(full[0].idMeal, full[0]);
      }
    }));
  }
  // Category lookup for mains
  const catMap = {chicken:"Chicken",beef:"Beef",pork:"Pork",fish:"Seafood",salmon:"Seafood",shrimp:"Seafood",pasta:"Pasta",lamb:"Lamb",breakfast:"Breakfast",vegetarian:"Vegetarian",vegan:"Vegan"};
  for (const term of terms) {
    if (catMap[term] && results.size < 10) {
      const stubs = await mdbFetch(MDB + "/filter.php?c=" + encodeURIComponent(catMap[term]));
      await Promise.all(stubs.slice(0,10).map(async stub => {
        if (!results.has(stub.idMeal)) {
          const full = await mdbFetch(MDB + "/lookup.php?i=" + stub.idMeal);
          if (full[0]) results.set(full[0].idMeal, full[0]);
        }
      }));
    }
  }

  const webRecipes = [...results.values()].map(mdbConvert);

  // Merge web + local (dedup by name)
  const allCandidates = new Map();
  [...webRecipes, ...RECIPE_DB].forEach(r => {
    const k = (r.name||"").toLowerCase().trim();
    if (!allCandidates.has(k)) allCandidates.set(k, r);
  });

  // Score and sort
  const scored = [...allCandidates.values()].map(r => {
    const { score, matched } = scoreRecipe(r, query);
    return { ...r, _score:score, _matched:matched };
  }).sort((a,b) => b._score - a._score);

  // Always return results — mark pantry
  return scored.slice(0,10).map(r => ({
    ...r,
    ingredients: (r.ingredients||[]).map(ing => ({ ...ing, have: pMatch(ing.name, S.pantry) }))
  }));
}

function buildMealPlan(prefs) {
  const pool = MEAL_POOLS[prefs.diet] || MEAL_POOLS.balanced;
  const used = new Set();
  const plan = {};

  function pick(arr) {
    const avail = arr.filter(m => !used.has(m));
    const src   = avail.length > 0 ? avail : arr;
    const m     = src[Math.floor(Math.random() * src.length)];
    used.add(m);
    return m;
  }

  DAYS.forEach(day => {
    plan[day] = {
      Breakfast: pick(pool.breakfast),
      Lunch:     pick(pool.lunch),
      Dinner:    pick(pool.dinner),
    };
  });

  // Grocery summary — items needed that aren't in pantry
  const allMealNames = DAYS.flatMap(d => Object.values(plan[d]));
  const grocMap = new Map();
  allMealNames.forEach(mealName => {
    const r = RECIPE_DB.find(x => x.name === mealName);
    if (r) r.ingredients.forEach(i => { if (!pMatch(i.name, S.pantry) && !grocMap.has(i.name)) grocMap.set(i.name, true); });
  });

  const dietLabels = { balanced:"balanced", vegetarian:"vegetarian", vegan:"fully plant-based", keto:"keto/low-carb", mediterranean:"Mediterranean-style", "high-protein":"high-protein" };

  return {
    plan,
    grocery_summary: [...grocMap.keys()].slice(0, 20),
    nutrition_note:  "Your " + (dietLabels[prefs.diet]||prefs.diet) + " plan for " + prefs.people + " people.",
    tips: [
      "Prep your proteins on Sunday — batch-cook chicken or hard-boil eggs to save time on weekdays.",
      "Double dinner quantities to get ready-made lunches the next day with zero extra effort.",
      "Keep your pantry stocked with the basics: olive oil, garlic, onions, canned tomatoes, salt and pepper.",
      "Check for expiring items in your pantry and plan meals around those first to reduce waste.",
    ],
  };
}

      '<div class="ch"><div class="chi" style="background:var(--pbg)">&#x1F4C5;</div>' +
        '<div><div class="ct">Weekly Meal Planner</div>' +
        '<div class="cs">Generates a smart 7-day plan &mdash; no account needed</div></div></div>' +
      '<div class="cb">' +
        '<div class="two">' +
          '<div>' +
            '<label class="fl">Diet preference</label>' +
            '<select class="sel" id="pdiet" style="margin-bottom:13px">' + ["balanced","vegetarian","vegan","keto","mediterranean","high-protein"].map(d=>'<option'+(p.diet===d?" selected":"")+'>'+d+'</option>').join("") + '</select>' +
            '<label class="fl">Number of people</label>' +
            '<select class="sel" id="pppl" style="margin-bottom:13px">' + ["1","2","3","4","5","6+"].map(n=>'<option'+(p.people===n?" selected":"")+'>'+n+'</option>').join("") + '</select>' +
          '</div>' +
          '<div>' +
            '<label class="fl">Budget</label>' +
            '<select class="sel" id="pbud" style="margin-bottom:13px">' + ["tight","moderate","flexible","premium"].map(b=>'<option'+(p.budget===b?" selected":"")+'>'+b+'</option>').join("") + '</select>' +
            '<label class="fl">Avoid / allergies</label>' +
            '<input class="inp" id="pavoid" placeholder="e.g. nuts, shellfish, gluten&hellip;" value="' + p.avoid + '"/>' +
          '</div>' +
        '</div>' +
        '<div class="dvd"></div>' +
        '<button class="btn bp bfull" id="genplan">&#x1F5D3;&#xFE0F; Generate My 7-Day Plan</button>' +
      '</div></div>' +
    '<div id="pload"></div>' +
    '<div id="presult">' + (S.mealPlan ? buildPlanHTML() : "") + '</div>';

  main.querySelector("#genplan").onclick = () => {
    S.mealPrefs = {
      diet:   main.querySelector("#pdiet").value,
      people: main.querySelector("#pppl").value,
      budget: main.querySelector("#pbud").value,
      avoid:  main.querySelector("#pavoid").value || "nothing",
    };
    const btn = main.querySelector("#genplan");
    btn.disabled = true; btn.innerHTML = '<span class="spn"></span> Planning your week&hellip;';
    main.querySelector("#pload").innerHTML = loading("Building a delicious and varied week for you&hellip;");
    main.querySelector("#presult").innerHTML = "";
    setTimeout(() => {
      S.mealPlan = buildMealPlan(S.mealPrefs);
      main.querySelector("#pload").innerHTML = "";
      main.querySelector("#presult").innerHTML = buildPlanHTML();
      toast("\u2713 7-day meal plan ready!");
      btn.disabled = false; btn.textContent = "&#x1F5D3;&#xFE0F; Regenerate Plan";
    }, 700);
  };
}

function buildPlanHTML() {
  const p = S.mealPlan;
  return '<div class="card">' +
    '<div class="ch"><div class="chi" style="background:var(--gbg)">&#x1F5D3;&#xFE0F;</div>' +
      '<div><div class="ct">Your Week Ahead</div><div class="cs">' + (p.nutrition_note||"") + '</div></div></div>' +
    '<div class="cb" style="overflow-x:auto">' +
      '<div class="wgrid">' +
        DAYS.map(day =>
          '<div>' +
            '<div class="dlbl">' + day + '</div>' +
            MOD.map(meal =>
              '<div class="mslot">' +
                '<div class="mslab">' + meal + '</div>' +
                (p.plan[day]&&p.plan[day][meal]
                  ? '<div class="msname">' + p.plan[day][meal] + '</div>'
                  : '<div style="font-size:10px;color:var(--tx3);font-style:italic">&mdash;</div>') +
              '</div>'
            ).join("") +
          '</div>'
        ).join("") +
      '</div>' +
    '</div></div>' +
    '<div class="two">' +
      '<div class="card">' +
        '<div class="ch"><div class="chi" style="background:var(--abg)">&#x1F6CD;&#xFE0F;</div>' +
          '<div><div class="ct">Items to Buy</div><div class="cs">Not currently in your pantry</div></div></div>' +
        '<div class="cb">' +
          (p.grocery_summary.length === 0
            ? '<div style="font-size:13px;color:var(--g)">&#x2713; Your pantry has everything for this plan!</div>'
            : p.grocery_summary.map(it =>
                '<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--bdr);font-size:13px">' +
                  '<span style="width:6px;height:6px;border-radius:50%;background:var(--g2);flex-shrink:0;display:inline-block"></span>' + it +
                '</div>'
              ).join("")) +
        '</div></div>' +
      '<div class="card">' +
        '<div class="ch"><div class="chi" style="background:var(--bbg)">&#x1F4A1;</div>' +
          '<div><div class="ct">Chef Tips</div><div class="cs">Make your week easier</div></div></div>' +
        '<div class="cb">' +
          p.tips.map((t, i) =>
            '<div style="padding:9px 12px;background:var(--s2);border-radius:var(--rr);margin-bottom:9px;font-size:13px;color:var(--tx2);line-height:1.55">' +
              '<span style="font-family:var(--fd);font-weight:700;color:var(--g);margin-right:6px">' + (i+1) + '.</span>' + t +
            '</div>'
          ).join("") +
        '</div></div>' +
    '</div>';
}
